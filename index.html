<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelación de Género</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="canvas">
    <div class="main-card">
        <h1 class="invitation-title">Invitación</h1>

        <div class="hero-section">
            <div class="character">
                <img src="elefante.png" alt="Baby Boy" class="img-large">
                <p class="ninos">Niño</p>
            </div>
            <div class="character">
                <img src="elefanta.png" alt="Baby Girl" class="img-large">
                <p class="ninas">Niña</p>
            </div>
        </div>

        <div>
            <p class="invitation-text">
                Estamos emocionados de invitarte a la revelación de género de nuestro bebé. 
                Acompáñanos para descubrir juntos si es un niño o una niña.
            </p>
        </div>

        <div class="info-glass">
            <div class="data-row">
                <span class="symbol">🏠</span>
                <p>Casa Lorenzo, Bo. Sinaí</p>
            </div>
            <div class="data-row">
                <span class="symbol">📅</span>
                <p>23 de mayo, 2026</p>
            </div>
            <div class="data-row">
                <span class="symbol">🕒</span>
                <p>3:00 Pm</p>
            </div>
        </div>

        <div class="button-container">
            <a href="https://waze.com/ul?ll=10.20404851,-83.79863405&navigate=yes" class="btn-primary">Ubicación Waze</a>
            <button id="confirmBtn" class="btn-secondary">Confirmar Asistencia</button>
        </div>
        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js"></script>
</body>
</html>
