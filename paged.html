<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelación de Género</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="canvas">
        <div class="main-card">
            <h1 class="invitation-title">Arbol de la Revelación</h1>
            <div class="tree-container" id="treeContainer">
                <img src="arbol2.png" alt="arbol de revelación" class="tree-base-img">
            </div>

            <div class="team-counter">
                <div class="counter-inner">
                    <div class="counter-item">
                        <span class="counter-num nina" id="cntNina">0</span>
                        <span class="counter-label">Team Niña</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-num total" id="cntTotal">0</span>
                        <span class="counter-label">Huellas</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-num nino" id="cntNino">0</span>
                        <span class="counter-label">Team Niño</span>
                    </div>
                </div>
            </div>

            <!-- CAJA MÁGICA DE REVELACIÓN -->
            <div style="margin-top: 25px; display: flex; flex-direction: column; align-items: center;">
                <div id="cajaRevelacion" class="caja-regalo">
                    <img id="cajaImg" src="caja1.png" alt="Caja de revelación" class="caja-img">
                    <p class="caja-hint">Toca para revelar el género 🎁</p>
                </div>
            </div>
        </div>

        <!-- MODAL DEDICATORIAS (elefantitos) -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-card">
                <div class="modal-header">
                    <div id="modalAvatarWrap"></div>
                    <div>
                        <div class="modal-name" id="modalNombre">—</div>
                        <div class="modal-team-tag" id="modalTeamTag">—</div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="modal-familiarity" id="modalParentesco"></div>
                    <div class="modal-dedication" id="modalMensaje"></div>
                </div>
                <button class="modal-close" id="modalCloseBtn">✕ Volver al árbol</button>
            </div>
        </div>

        <!-- MODAL CONTRASEÑA -->
        <div class="custom-modal-overlay" id="modalPassword">
            <div class="custom-modal-box">
                <span class="custom-modal-icon">🔐</span>
                <div class="custom-modal-title">Acceso Secreto</div>
                <p class="custom-modal-msg">Solo quien sabe el secreto puede abrir esta caja...</p>
                <input type="password" id="inputPassword" placeholder="CONTRASEÑA SECRETA" class="btn-secondary"
                    style="background: rgba(255,255,255,0.08); text-align:center; width: calc(100% - 44px); margin: 0 22px; display:block;">
                <p id="passwordError"
                    style="color:#ff6b8a; font-size:0.8rem; letter-spacing:1.5px; text-transform:uppercase; margin: 8px 22px 0; display:none;">
                    ✕ Contraseña incorrecta</p>
                <div style="display:flex; gap:10px; margin: 18px 22px 22px;">
                    <button class="custom-modal-btn ghost" id="btnCancelarPassword"
                        style="flex:1; margin:0;">Cancelar</button>
                    <button class="custom-modal-btn gold" id="btnConfirmarPassword" style="flex:1; margin:0;">Abrir
                        🗝️</button>
                </div>
            </div>
        </div>

        <!-- PANTALLA DE ANIMACIÓN ÉPICA -->
        <div id="animacionEpica" class="animacion-epica-overlay">
            <canvas id="confettiCanvas"></canvas>
            <div id="humoMagico" class="humo-magico"></div>
            <div id="brilloExplosion" class="brillo-explosion"></div>
            <img id="cajaAbiertaEpica" src="caja2.png" class="caja-abierta-epica" alt="caja abierta">
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
