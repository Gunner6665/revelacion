<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelación de Género</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="canvas">
        <div class="main-card">
            <h1 class="invitation-title">Arbol de la Revelación</h1>
            <div class="tree-container" id="treeContainer">
                <img src="arbol2.png" alt="arbol de revelación" class="tree-base-img">
            </div>

            <div class="team-counter">
                <div class="counter-inner">
                    <div class="counter-item">
                        <span class="counter-num nina" id="cntNina">0</span>
                        <span class="counter-label">Team Niña</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-num total" id="cntTotal">0</span>
                        <span class="counter-label">Huellas</span>
                    </div>
                    <div class="counter-divider"></div>
                    <div class="counter-item">
                        <span class="counter-num nino" id="cntNino">0</span>
                        <span class="counter-label">Team Niño</span>
                    </div>
                </div>
            </div>

            <div style="margin-top: 25px;">
                <button id="btnRevelar" class="btn-primary">✨ Revelar Género Real ✨</button>
            </div>
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-card">
                <div class="modal-header">
                    <div id="modalAvatarWrap"></div>
                    <div>
                        <div class="modal-name" id="modalNombre">—</div>
                        <div class="modal-team-tag" id="modalTeamTag">—</div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="modal-familiarity" id="modalParentesco"></div>
                    <div class="modal-dedication" id="modalMensaje"></div>
                </div>
                <button class="modal-close" id="modalCloseBtn">✕ Volver al árbol</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
